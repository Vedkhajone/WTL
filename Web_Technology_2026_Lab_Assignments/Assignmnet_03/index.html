<!doctype html>
<html>
  <head>
    <title>Calculator</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .calculator {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        width: 260px;
        text-align: center;
      }

      h2 {
        margin-bottom: 15px;
      }

      input {
        width: 100%;
        height: 40px;
        font-size: 18px;
        text-align: right;
        margin-bottom: 10px;
        padding: 5px;
      }
      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .buttons button {
        width: 22%;
      }

      button {
        height: 40px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        background: #e0e0e0;
        border-radius: 5px;
      }

      button:hover {
        background: #ccc;
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <h2>Calculator</h2>
      <input type="text" id="display" placeholder="0" />

      <div class="buttons">
        <button>C</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>/</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>*</button>

        <button>0</button>
        <button>.</button>
        <button>=</button>
        <button>+</button>

        <button>-</button>
      </div>
    </div>
    <script>
      var display = document.getElementById("display");
      var buttons = document.querySelectorAll(".buttons button");

      buttons.forEach(function (button) {
        button.addEventListener("click", function () {
          var value = button.textContent;

          if (value === "C") {
            display.value = "";
          } else if (value === "=") {
            display.value = eval(display.value);
          } else {
            display.value = display.value + value;
          }
        });
      });
    </script>
  </body>
</html>
