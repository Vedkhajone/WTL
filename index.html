<!DOCTYPE html>
<html>
<head>
    <title>College Events</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f8f8f8;
        }

        /* NAVBAR */
        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #e63946;
        }

        .search-box {
            width: 40%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login {
            text-decoration: none;
            color: #333;
        }

        /* CATEGORY TABS */
        .categories {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .cat {
            margin: 0 15px;
            padding: 10px 20px;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .cat:hover {
            background: #e63946;
            color: white;
        }

        /* SECTION */
        .section {
            padding: 20px 40px;
        }

        .section h2 {
            margin-bottom: 10px;
        }

        /* CARDS */
        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            width: 250px;
            height: 180px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            color: white;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-text {
            position: absolute;
            bottom: 10px;
            left: 10px;
        }

        .card-text h3 {
            margin: 0;
        }

        .card-text span {
            font-size: 12px;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Eventify</div>
    <input type="text" class="search-box" placeholder="Search events...">
    <a href="admin_login.html" class="login">Admin Login</a>
</div>

<!-- CATEGORIES -->
<div class="categories">
    <div class="cat">Tech</div>
    <div class="cat">Cultural</div>
    <div class="cat">Sports</div>
</div>

<!-- COLLECTIONS -->
<div class="section">
    <h2>Upcoming Events</h2>
    <p>Explore exciting events happening in your college</p>

    <div class="cards">

        <div class="card">
            <img src="https://source.unsplash.com/300x200/?technology">
            <div class="card-text">
                <h3>AI Workshop</h3>
                <span>25 March</span>
            </div>
        </div>

        <div class="card">
            <img src="https://source.unsplash.com/300x200/?music">
            <div class="card-text">
                <h3>Cultural Fest</h3>
                <span>5 April</span>
            </div>
        </div>

        <div class="card">
            <img src="https://source.unsplash.com/300x200/?sports">
            <div class="card-text">
                <h3>Sports Meet</h3>
                <span>15 April</span>
            </div>
        </div>

    </div>
</div>

</body>
</html>
